<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=IM+Fell+English+SC&family=Fleur+De+Leah&family=Pinyon+Script&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">

    <div class="brand">

        <img src="logo.png" id="siteLogo" alt="AlcoveLog Logo">

        <div class="brand-text">

            <h1>AlcoveLog</h1>

            <span>Your Archivum</span>

        </div>

    </div>

    <nav class="header-actions">

        <button id="addBtn" onclick="addManga()" title="Add">
            ➕
        </button>

        <button id="profileBtn" title="Profile">
            👤
        </button>

        <button id="themeBtn" title="Theme">
            🌙
        </button>

    </nav>

</header>

<div class="search-container">

    <input
        type="text"
        id="searchBox"
        placeholder="Search your Archivum..."
        oninput="handleSearch(this.value)"
    />

    <button 
        id="clearSearch"
        onclick="clearSearch()">
        ✕
    </button>

</div>

<div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center; align-items: center;">
    <button onclick="prevPage()">⬅ Prev</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">Next ➡</button>
</div>

<div id="list"></div>

<p>My manga tracking website!</p>

<script src="script.js?v=2"></script>
<div id="record-log-popup" class="history-box"></div>

<div id="reading-history-popup" class="history-box"></div>

<div id="delete-popup" class="history-box"></div>
</body>
</html>
