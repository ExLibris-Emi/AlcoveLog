<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    

    <title>Emi's Manga Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div class="logo">📚 Emi’s Manga Archive</div>
</div>
<button onclick="addManga()">Add Manga</button>

<div style="margin: 15px 0; text-align: center;">
    <input
        type="text"
        id="searchBox"
        placeholder="Search manga..."
        oninput="handleSearch(this.value)"
        style="padding: 12px; width: 75%; max-width: 500px; border-radius: 10px; border: none; font-size: 16px;"
    />
</div>

<div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center; align-items: center;">
    <button onclick="prevPage()">⬅ Prev</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">Next ➡</button>
</div>

<div id="list"></div>

<p>My manga tracking website!</p>

<script src="script.js?v=2"></script>
<div id="record-log-popup" class="history-box"></div>

<div id="reading-history-popup" class="history-box"></div>

<div id="delete-popup" class="history-box"></div>
</body>
</html>
